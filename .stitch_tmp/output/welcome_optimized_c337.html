<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>CoolCook - Welcome</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed-dim": "#ffb95a",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#ebe2ce",
                        "tertiary-container": "#00abf3",

                        "background": "#fff8f0",
                        "tertiary-fixed": "#c9e6ff",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#353023",
                        "on-background": "#1f1b0f",
                        "on-error": "#ffffff",
                        "primary-container": "#f58220",
                        "primary-fixed": "#ffdcc6",
                        "on-secondary-fixed": "#2a1800",
                        "error-container": "#ffdad6",
                        "surface-variant": "#ebe2ce",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#643f00",
                        "surface": "#fff8f0",
                        "surface-tint": "#964900",
                        "tertiary-fixed-dim": "#89ceff",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#ffb786",
                        "secondary": "#845400",
                        "outline-variant": "#ddc1b0",
                        "outline": "#8a7264",
                        "primary": "#964900",
                        "on-surface": "#1f1b0f",
                        "surface-container-low": "#fdf3df",
                        "secondary-container": "#feb246",
                        "secondary-fixed": "#ffddb6",
                        "on-secondary-container": "#6f4600",
                        "tertiary": "#006491",
                        "on-primary-fixed": "#311300",
                        "surface-dim": "#e2d9c6",
                        "on-tertiary-fixed": "#001e2f",
                        "surface-container-high": "#f1e7d4",
                        "on-tertiary-fixed-variant": "#004c6e",
                        "surface-container": "#f7edd9",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#723600"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }
        .organic-shape-blob {
            border-radius: 43% 57% 70% 30% / 30% 30% 70% 70%;
        }
        /* Prevent elastic scroll issues on some mobile browsers */
        body {
            overscroll-behavior-y: none;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Decorative Organic Shapes -->
<div class="absolute top-[-10%] right-[-10%] w-[50vw] h-[50vw] max-w-[400px] max-h-[400px] bg-secondary-container/20 rounded-full blur-3xl z-0 pointer-events-none"></div>
<div class="absolute bottom-[-5%] left-[-15%] w-[60vw] h-[60vw] max-w-[500px] max-h-[500px] bg-primary/10 rounded-full blur-3xl z-0 pointer-events-none"></div>
<!-- Main Content Container -->
<main class="w-full max-w-md px-6 py-4 z-10 flex flex-col items-center justify-between min-h-screen h-screen max-h-[900px] relative">
<!-- Logo Area -->
<div class="flex items-center justify-center gap-2 pt-6 sm:pt-8 shrink-0">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="restaurant_menu">restaurant_menu</span>
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-primary">CoolCook</h1>
</div>
<!-- Hero Imagery Canvas -->
<div class="relative w-full max-w-[280px] sm:max-w-[320px] aspect-square mx-auto flex items-center justify-center my-4 sm:my-8">
<!-- Artistic Brush/Blob Background -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary to-primary-container organic-shape-blob opacity-90 scale-105 transform -rotate-6"></div>
<!-- Hero Image -->
<img alt="Beautifully plated fresh salad with vibrant greens and artistic presentation" class="relative w-full h-full object-cover rounded-full shadow-[0_12px_32px_rgba(31,27,15,0.15)] border-4 border-surface-container-lowest z-10 hover:scale-105 transition-transform duration-500" data-alt="high-end editorial food photography of a vibrant, fresh salad with edible flowers plated organically on a textured ceramic dish, dynamic lighting, top down view" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHSSclpYlCs-1j_WXLDTF-SA_P0Ta2g7GwiPgRJlGAObDA83HTSD02PGhodwQ0tIm2v7NQDYp5s9O6MG-TbkzLBcD2BUYkXr-VwgVBpRaPUzQkgIuOXLMNKRv8TMw8-pOhIzDBRF2leYVdWAYS3KG1T2gLxdG3UumlTXG62gUsqxF02130vrJBc-qVZ8GD5sDJ0aP6SuKkHEHIgr1JWaF4RmxuZPjcQ14BTgHZ4o7MIqq8fuhbm0wwq1lQCzJ1lNktZ4TfCwlfDzlY"/>
<!-- Floating Decorative Element -->
<div class="absolute -bottom-2 -right-2 sm:-bottom-4 sm:-right-4 bg-surface-container-lowest rounded-full p-2.5 sm:p-3 shadow-[0_8px_24px_rgba(31,27,15,0.12)] z-20">
<span class="material-symbols-outlined text-primary-container text-xl sm:text-2xl" data-icon="local_fire_department">local_fire_department</span>
</div>
</div>
<!-- Typography Block -->
<div class="text-center space-y-2 sm:space-y-4 w-full relative shrink-0">
<!-- Abstract accent mark -->
<div class="absolute -top-4 sm:-top-6 left-1/2 -translate-x-1/2 w-12 sm:w-16 h-1 bg-primary-container rounded-full opacity-60"></div>
<h2 class="font-headline font-extrabold text-[28px] sm:text-[32px] leading-tight text-on-surface">Chào mừng đến với CoolCook</h2>
<p class="font-body text-on-surface-variant text-sm sm:text-base px-4">Khám phá thế giới ẩm thực của bạn</p>
</div>
<!-- Actions & Footer Info -->
<div class="w-full space-y-4 sm:space-y-6 pb-6 mt-auto">
<!-- Primary Button leads to Login State -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-body font-semibold text-lg py-4 rounded-lg shadow-[0_8px_24px_rgba(245,130,32,0.25)] hover:scale-[1.02] active:scale-95 transition-all duration-200">
                Đăng nhập
            </button>
<!-- Secondary Action leads to Register State -->
<div class="flex flex-col items-center gap-4">
<p class="text-center font-body text-sm text-on-surface-variant">
                    Nếu chưa có tài khoản? 
                    <a class="font-bold text-primary hover:text-primary-container underline decoration-primary/30 underline-offset-4 transition-colors" href="#">Đăng ký ngay</a>
</p>
<!-- Developer Note -->
<p class="text-[10px] text-on-surface-variant/40 italic text-center max-w-[200px] leading-tight">
                    Hai hành động sẽ mở cùng màn hình xác thực, khác trạng thái hiển thị ban đầu.
                </p>
</div>
</div>
</main>
</body></html>
