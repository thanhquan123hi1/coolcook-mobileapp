<style>
        body { font-family: 'Manrope', sans-serif; }

                        transform 380ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        [data-state="hidden"] {
            display: none;
            opacity: 0;
            transform: scale(0.97) translateY(20px);
            pointer-events: none;
        }
        
        [data-state="visible"] {
            display: block;
            opacity: 1;
            transform: scale(1) translateY(0);
            animation: spring-pop 380ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes spring-pop {
            0% { opacity: 0; transform: scale(0.98) translateY(20px); }
            70% { transform: scale(1.01) translateY(-2px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

<script>
        function toggleState(state) {
            const loginState = document.getElementById('login-state');
            const registerState = document.getElementById('register-state');
            
            if (state === 'register') {
                loginState.setAttribute('data-state', 'hidden');
                setTimeout(() => {
                    loginState.style.display = 'none';
                    registerState.style.display = 'block';
                    // Force reflow for animation
                    void registerState.offsetWidth;
                    registerState.setAttribute('data-state', 'visible');
                }, 150);
            } else {
                registerState.setAttribute('data-state', 'hidden');
                setTimeout(() => {
                    registerState.style.display = 'none';
                    loginState.style.display = 'block';
                    // Force reflow for animation
                    void loginState.offsetWidth;
                    loginState.setAttribute('data-state', 'visible');
                }, 150);
            }
        }

        // Handle initial viewport height sizing on mobile
        const setHeight = () => {
            document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
        };
        window.addEventListener('resize', setHeight);
        setHeight();
    </script>
