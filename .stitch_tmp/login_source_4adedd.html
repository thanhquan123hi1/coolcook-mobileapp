<div class="relative group">

<label class="absolute left-0 top-3 text-on-surface-variant text-sm transition-all peer-placeholder-shown:text-base peer-placeholder-shown:top-3 peer-focus:-top-3.5 peer-focus:text-xs peer-focus:text-primary font-label" for="login-email">Email</label>

</button>

<span class="text-sm text-on-surface-variant group-hover:text-on-surface transition-colors font-body">Ghi nhớ tôi</span>
